  <circle cx="150" cy="700" r="200" fill="#A7F3D0" opacity="0.8" filter="url(#hblur)"/>
  <g fill="#059669" opacity="0.1"><circle cx="110" cy="100" r="3.5"/><circle cx="198" cy="100" r="3.5"/><circle cx="286" cy="100" r="3.5"/><circle cx="374" cy="100" r="3.5"/><circle cx="462" cy="100" r="3.5"/><circle cx="550" cy="100" r="3.5"/><circle cx="638" cy="100" r="3.5"/><circle cx="726" cy="100" r="3.5"/><circle cx="814" cy="100" r="3.5"/><circle cx="110" cy="220" r="3.5"/><circle cx="198" cy="220" r="3.5"/><circle cx="286" cy="220" r="3.5"/><circle cx="374" cy="220" r="3.5"/><circle cx="462" cy="220" r="3.5"/><circle cx="550" cy="220" r="3.5"/><circle cx="638" cy="220" r="3.5"/><circle cx="726" cy="220" r="3.5"/><circle cx="814" cy="220" r="3.5"/><circle cx="110" cy="340" r="3.5"/><circle cx="198" cy="340" r="3.5"/><circle cx="286" cy="340" r="3.5"/><circle cx="374" cy="340" r="3.5"/><circle cx="462" cy="340" r="3.5"/><circle cx="550" cy="340" r="3.5"/><circle cx="638" cy="340" r="3.5"/><circle cx="726" cy="340" r="3.5"/><circle cx="814" cy="340" r="3.5"/><circle cx="110" cy="460" r="3.5"/><circle cx="198" cy="460" r="3.5"/><circle cx="286" cy="460" r="3.5"/><circle cx="374" cy="460" r="3.5"/><circle cx="462" cy="460" r="3.5"/><circle cx="550" cy="460" r="3.5"/><circle cx="638" cy="460" r="3.5"/><circle cx="726" cy="460" r="3.5"/><circle cx="814" cy="460" r="3.5"/><circle cx="110" cy="580" r="3.5"/><circle cx="198" cy="580" r="3.5"/><circle cx="286" cy="580" r="3.5"/><circle cx="374" cy="580" r="3.5"/><circle cx="462" cy="580" r="3.5"/><circle cx="550" cy="580" r="3.5"/><circle cx="638" cy="580" r="3.5"/><circle cx="726" cy="580" r="3.5"/><circle cx="814" cy="580" r="3.5"/><circle cx="110" cy="700" r="3.5"/><circle cx="198" cy="700" r="3.5"/><circle cx="286" cy="700" r="3.5"/><circle cx="374" cy="700" r="3.5"/><circle cx="462" cy="700" r="3.5"/><circle cx="550" cy="700" r="3.5"/><circle cx="638" cy="700" r="3.5"/><circle cx="726" cy="700" r="3.5"/><circle cx="814" cy="700" r="3.5"/></g>

