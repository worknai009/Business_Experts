    <circle cx="880" cy="720" r="42" fill="#ffffff"/>
    <g transform="translate(856,696) scale(2)" fill="none" stroke="#059669" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15c-2 0-4-2-4-4 0-4 2-8 4-9 2 1 4 5 4 9 0 2-2 4-4 4zM8 13l-3 2 1 3M16 13l3 2-1 3M12 15v5"/></g>
