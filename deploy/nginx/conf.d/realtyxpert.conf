# ---------- HTTP: ACME challenge + redirect to HTTPS ----------
server {
  listen 80;
  server_name realtyxpert.online www.realtyxpert.online admin.realtyxpert.online api.realtyxpert.online;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ---------- Main website: realtyxpert.online ----------
server {
  listen 443 ssl;
  http2 on;
  server_name realtyxpert.online;

  ssl_certificate /etc/letsencrypt/live/realtyxpert.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/realtyxpert.online/privkey.pem;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://backend:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# ---------- www redirect ----------
server {
  listen 443 ssl;
  http2 on;
  server_name www.realtyxpert.online;

  ssl_certificate /etc/letsencrypt/live/realtyxpert.online/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/realtyxpert.online/privkey.pem;

  return 301 https://realtyxpert.online$request_uri;
}

