services:
  # Service names are prefixed with "be-" so their DNS aliases on the shared
  # giftme_app network never collide with the other project's "frontend"/
  # "backend" services (a collision makes Caddy route the wrong site).
  be-backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=5000
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - default
      - edge

  be-frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - default
      - edge

  be-admin:
    build: ./admin
    restart: unless-stopped
    networks:
      - default
      - edge

# Reverse proxy + SSL is handled by the shared Caddy container (giftme-caddy-1)
# on the external "giftme_app" network. It routes businessexperts.asia domains to
# be-frontend / be-admin / be-backend and manages certificates automatically.
networks:
  edge:
    external: true
    name: giftme_app
