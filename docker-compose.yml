services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=5000
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      default:
      edge:
        aliases:
          - be-backend

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      default:
      edge:
        aliases:
          - be-frontend

  admin:
    build: ./admin
    restart: unless-stopped
    networks:
      default:
      edge:
        aliases:
          - be-admin

# Reverse proxy + SSL is handled by the shared Caddy container (giftme-caddy-1)
# on the external "giftme_app" network. It routes realtyxpert.online domains to
# the aliases above and manages Let's Encrypt certificates automatically.
networks:
  edge:
    external: true
    name: giftme_app
